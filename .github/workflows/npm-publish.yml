name: Publish to npm with version tagging (OIDC)

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'

  workflow_dispatch:

jobs:
  publish-official:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mariocp'
      
      - name: Install dependencies
        run: npm install
      
      - name: Validate version tag
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag must be in format v1.2.3"
            exit 1
          fi
          # Remove 'v' prefix for npm version
          NPM_VERSION=${VERSION#v}
          echo "version=$NPM_VERSION" >> $GITHUB_OUTPUT
          echo "Creating official release: $NPM_VERSION"
      
      - name: Update package.json with tag version
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          echo "Updating package.json to version $TAG_VERSION"
          jq --arg version "$TAG_VERSION" '.version = $version' package.json > package.json.tmp && mv package.json.tmp package.json
      
      - name: Run tests
        run: npm test

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      

      - name: Publish to npm using OIDC
        run: npm publish --access public --provenance
      

  publish-experimental:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mariocp'
      
      - name: Install dependencies
        run: npm install
      
      - name: Get current commit info and versions from npm
        id: commit_info
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          COMMIT_DATE=$(date -u +%Y-%m-%d-%H-%M-%S)
          
          # Get latest official version from npm (tag=latest)
          OFFICIAL_VERSION=$(npm view roxul@latest version 2>/dev/null || echo "0.0.0")
          echo "latest_version=$OFFICIAL_VERSION" >> $GITHUB_OUTPUT
          
          # Get latest experimental version from npm (tag=experimental)
          EXPERIMENTAL_VERSION=$(npm view roxul@experimental version 2>/dev/null || echo "none")
          echo "experimental_version=$EXPERIMENTAL_VERSION" >> $GITHUB_OUTPUT
          
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "Official (latest): $OFFICIAL_VERSION"
          echo "Experimental: $EXPERIMENTAL_VERSION"
      
      - name: Calculate experimental version (smart increment)
        id: exp_version
        run: |
          OFFICIAL_VERSION="${{ steps.commit_info.outputs.latest_version }}"
          EXPERIMENTAL_VERSION="${{ steps.commit_info.outputs.experimental_version }}"
          
          # Parse official major.minor
          IFS='.' read -r OFF_MAJOR OFF_MINOR OFF_PATCH <<< "$OFFICIAL_VERSION"
          OFFICIAL_BASE="${OFF_MAJOR}.${OFF_MINOR}"
          
          # Determine experimental version
          if [[ "$EXPERIMENTAL_VERSION" != "none" ]]; then
            IFS='.' read -r EXP_MAJOR EXP_MINOR EXP_PATCH <<< "$EXPERIMENTAL_VERSION"
            EXPERIMENTAL_BASE="${EXP_MAJOR}.${EXP_MINOR}"
            
            if [[ "$EXPERIMENTAL_BASE" == "$OFFICIAL_BASE" ]]; then
              # Same major.minor → increment patch
              NEW_PATCH=$((EXP_PATCH + 1))
              FINAL_VERSION="${OFFICIAL_BASE}.${NEW_PATCH}"
              echo "Experimental matches official base ($OFFICIAL_BASE) → incrementing patch: $FINAL_VERSION"
            else
              # Different major.minor → start at .1
              FINAL_VERSION="${OFFICIAL_BASE}.1"
              echo "Experimental base ($EXPERIMENTAL_BASE) != official base ($OFFICIAL_BASE) → starting at: $FINAL_VERSION"
            fi
          else
            # No experimental exists → start at .1
            FINAL_VERSION="${OFFICIAL_BASE}.1"
            echo "No experimental version found → starting at: $FINAL_VERSION"
          fi
          
          echo "experimental_version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated experimental version: $FINAL_VERSION"
      
      - name: Update package.json for experimental version
        run: |
          EXPERIMENTAL_VERSION="${{ steps.exp_version.outputs.experimental_version }}"
          echo "Updating package.json to version $EXPERIMENTAL_VERSION"
          jq --arg version "$EXPERIMENTAL_VERSION" '.version = $version' package.json > package.json.tmp && mv package.json.tmp package.json
      
      - name: Run tests
        run: npm test
      
      - name: Build package
        run: npm run build

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      
      - name: Publish experimental version using OIDC
        run: npm publish --access public --tag experimental --provenance
      
      - name: Output experimental reference
        run: |
          echo "Experimental version published: ${{ steps.exp_version.outputs.experimental_version }}"
          echo "Based on official: ${{ steps.commit_info.outputs.latest_version }}"
          echo "Previous experimental: ${{ steps.commit_info.outputs.experimental_version }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Commit short: ${{ github.sha_short }}"
          echo "Install with: npm install @mariocp/roxul@experimental"
          echo "Reference: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
      
      - name: Reset package.json version
        run: git checkout -- package.json

  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [publish-official, publish-experimental]
    
    steps:
      - name: Cleanup workflow run logs
        run: |
          echo "Workflow completed successfully"
          echo "Official releases created for tagged versions"
          echo "Experimental versions created for each main branch commit"
